version: '3.8'

services:
  nte:
    build: .
    container_name: nte-api
    ports:
      - "7092:7092"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      # Database
      - DB_URL=jdbc:mariadb://mariadb:3306/nft
      - DB_USERNAME=nft
      - DB_PASSWORD=nft
      - QUARTZ_DB_URL=jdbc:mariadb://mariadb:3306/nft
      - QUARTZ_DB_USER=nft
      - QUARTZ_DB_PASSWORD=nft
      # AWS
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Security
      - API_KEY=${API_KEY}
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    container_name: nte-mariadb
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=nft
      - MYSQL_USER=nft
      - MYSQL_PASSWORD=nft
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb-data:
