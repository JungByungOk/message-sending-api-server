services:
  postgres:
    image: postgres:17
    container_name: ems-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=esm
      - POSTGRES_USER=esm
      - POSTGRES_PASSWORD=esm
      - TZ=Asia/Seoul
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esm -d esm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
