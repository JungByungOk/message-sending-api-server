version: '3.8'

services:
  nte:
    build: .
    container_name: nte-api
    ports:
      - "7092:7092"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      # Database
      - DB_URL=jdbc:postgresql://postgres:5432/nft
      - DB_USERNAME=nft
      - DB_PASSWORD=nft
      - QUARTZ_DB_URL=jdbc:postgresql://postgres:5432/nft
      - QUARTZ_DB_USER=nft
      - QUARTZ_DB_PASSWORD=nft
      # AWS
      - AWS_ACCESS_KEY=test
      - AWS_SECRET_KEY=test
      - AWS_ENDPOINT=http://localstack:4566
      # Security
      - API_KEY=${API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped

  localstack:
    image: localstack/localstack:4.4
    container_name: nte-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=ses,dynamodb,sqs,sns
      - DEFAULT_REGION=ap-northeast-2
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17
    container_name: nte-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nft
      - POSTGRES_USER=nft
      - POSTGRES_PASSWORD=nft
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nft -d nft"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  localstack-data:
